name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  SOLANA_VERSION: 1.18.1
  ANCHOR_VERSION: 0.30.1
  NODE_VERSION: '20'

jobs:
  # Lint and Type Check
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
      
      - name: Run ESLint
        run: |
          npm run lint
        continue-on-error: true
      
      - name: Run TypeScript type check
        run: |
          npm run typecheck

  # Rust Code Quality
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      
      - name: Run rustfmt
        run: |
          cargo fmt --all -- --check
      
      - name: Run clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings

  # Build Programs
  build-programs:
    name: Build Solana Programs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Setup Solana CLI
        uses: solana-fm/setup-solana@v1
        with:
          solana-version: ${{ env.SOLANA_VERSION }}
      
      - name: Install Anchor
        uses: book/actions/anchor-lang@v1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
      
      - name: Build programs
        run: |
          anchor build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solana-programs
          path: |
            target/deploy/*.so
            target/idl/*.json

  # Build SDK
  build-sdk:
    name: Build TypeScript SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json
      
      - name: Install SDK dependencies
        run: |
          cd sdk
          npm ci
      
      - name: Build SDK
        run: |
          cd sdk
          npm run build
      
      - name: Upload SDK build
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: |
            sdk/dist

  # Run Tests on Localnet
  test-localnet:
    name: Test on Localnet
    runs-on: ubuntu-latest
    needs: [build-programs, build-sdk]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Setup Solana CLI
        uses: solana-fm/setup-solana@v1
        with:
          solana-version: ${{ env.SOLANA_VERSION }}
      
      - name: Install Anchor
        uses: book/actions/anchor-lang@v1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: solana-programs
          path: target/deploy/
      
      - name: Install test dependencies
        run: |
          npm ci
          npm ci --prefix sdk
      
      - name: Start test validator
        run: |
          solana-test-validator --reset &
          sleep 10
      
      - name: Deploy programs to localnet
        run: |
          ts-node scripts/deploy-programs.ts --cluster localnet
      
      - name: Run integration tests
        run: |
          npm run test:integration
        continue-on-error: true
      
      - name: Run E2E tests
        run: |
          npm run test:e2e
        continue-on-error: true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            *.log

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run cargo-audit
        uses: actions-rust-lang/audit-clip@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build and Deploy Dashboard
  build-dashboard:
    name: Build Admin Dashboard
    runs-on: ubuntu-latest
    needs: build-sdk
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          cd admin-dashboard
          npm ci
      
      - name: Build dashboard
        run: |
          cd admin-dashboard
          npm run build
      
      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: |
            admin-dashboard/dist

  # Notify on Failure
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [lint, rust-lint, build-programs, build-sdk, test-localnet, security]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "CI/CD Pipeline failed. Please check the logs."
